name: Points Bot Runner

on:
  schedule:
    # كل 5 دقايق (GitHub مش بيضمن الدقة 100%، ممكن يتأخر شوية وقت الزحمة)
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # يسمحلك تشغّله يدوي من تاب Actions

# يمنع تشغيل أكتر من نسخة في نفس الوقت لنفس البوت
# لو تشغيلة لسه شغالة، اللي بعدها بينتظر بدل ما يشتغل جنبها
concurrency:
  group: points-bot-runner
  cancel-in-progress: false

permissions:
  contents: write # عشان يقدر يعمل commit/push لملفات data.json و offset.json

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # index.js دلوقتي بيفضل شغال لحد 4.5 دقيقة (long polling)، فبنحط
    # حد أقصى 6 دقايق كشبكة أمان لو حصل أي تعليق غير متوقع
    timeout-minutes: 6
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run bot cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "points-bot"
          git config user.email "points-bot@users.noreply.github.com"
          git add data.json offset.json
          git diff --staged --quiet || git commit -m "🔄 تحديث نقاط ومستويات المستخدمين [skip ci]"
          git push
