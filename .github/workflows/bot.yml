name: Points Bot Runner

on:
  schedule:
    # شبكة أمان بس، لإن السيلف-تشينينج تحت هو المسؤول الأساسي عن
    # الاستمرارية. لو حصل أي عطل والسلسلة اتقطعت، الـ cron ده هيرجعها
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # يسمحلك تشغّله يدوي من تاب Actions

# يمنع تشغيل أكتر من نسخة في نفس الوقت لنفس البوت
concurrency:
  group: points-bot-runner
  cancel-in-progress: false

permissions:
  contents: write # عشان يقدر يعمل commit/push لملفات data.json و offset.json
  actions: write # عشان يقدر يشغّل نفسه تاني (self-chaining)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run bot cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "points-bot"
          git config user.email "points-bot@users.noreply.github.com"
          git add data.json offset.json
          git diff --staged --quiet || git commit -m "🔄 تحديث نقاط ومستويات المستخدمين [skip ci]"
          git push

      # بيشغّل تشغيلة جديدة فورًا بمجرد ما دي تخلص، بدل ما يستنى
      # الـ scheduler بتاع GitHub (اللي أحيانًا بيتأخر دقايق وقت الزحمة)
      - name: Trigger next run immediately
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
